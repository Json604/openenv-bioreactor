name: bioperator-env
version: 0.1.0
description: |
  BioOperatorEnv: a flight simulator for autonomous bioreactor operators.
  Python port of the IndPenSim industrial penicillin fermentation simulator
  (Goldrick et al., J. Biotechnology 2015), wrapped as an OpenEnv-compatible
  SCADA-style operator-training environment.

theme: world-modeling-professional
license: MIT

action:
  schema: bioperator_env.models.BioOperatorAction
  description: |
    Discrete operator action: feed/aeration/agitation deltas. 27-arm space.
    PID controllers for pH and temperature stay behind the agent's reach.

observation:
  schema: bioperator_env.models.BioOperatorObservation
  description: |
    SCADA-style plant console: online measurements + setpoints + manipulated
    variables + qualitative trends + alarms + previous action + delayed
    offline lab readings.

reward:
  type: rubric
  components:
    - name: format_validity
      weight: 0.05
    - name: do_safety
      weight: 0.30
    - name: productivity
      weight: 0.20
    - name: substrate_control
      weight: 0.15
    - name: stability
      weight: 0.10
    - name: control_effort
      weight: 0.10
    - name: terminal_yield_bonus
      weight: 0.10

tasks:
  - id: do-recovery-easy
    difficulty: easy
    description: Mild substrate-fault DO recovery during production phase.
  - id: do-recovery-medium
    difficulty: medium
    description: DO recovery + productivity preservation; the headline MVP task.
  - id: aeration-limit-hard
    difficulty: hard
    description: Aeration fault during high-density fermentation.
  - id: normal-baseline
    difficulty: dev
    description: No-fault sanity baseline.

server:
  command: uvicorn server.app:app --host 0.0.0.0 --port 7860
  port: 7860
